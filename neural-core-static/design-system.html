<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralOrbit — Design System</title>
    <meta name="description" content="NeuralOrbit Design System — Colors, Typography, and Components" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <style>
        .ds-hero {
            padding: 40px 40px 24px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(91, 140, 255, 0.06) 0%, transparent 60%);
        }

        .ds-hero-eyebrow {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .ds-hero-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .ds-hero-sub {
            font-size: 14px;
            color: var(--muted);
        }

        .ds-body {
            padding: 32px 40px;
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        .ds-section-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--dim);
            text-transform: uppercase;
            padding-bottom: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        /* Color swatches */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }

        .color-swatch {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--card-bg);
        }

        .color-block {
            height: 72px;
        }

        .color-info {
            padding: 10px 12px;
        }

        .color-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .color-hex {
            font-size: 11px;
            font-family: monospace;
            color: var(--accent);
            margin-top: 2px;
        }

        .color-usage {
            font-size: 10px;
            color: var(--dim);
            margin-top: 3px;
        }

        /* Typography */
        .type-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .type-row {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-bg);
        }

        .type-meta {
            min-width: 130px;
            flex-shrink: 0;
        }

        .type-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--dim);
            letter-spacing: 0.08em;
        }

        .type-spec {
            font-size: 10px;
            font-family: monospace;
            color: var(--accent);
            margin-top: 3px;
        }

        .type-sample {
            color: var(--text);
        }

        /* Buttons */
        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        /* Status badges */
        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        /* Component cards */
        .comp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .comp-card {
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
        }

        .comp-card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .comp-card-sub {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 16px;
        }

        /* KPI card demo */
        .demo-kpi {
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            padding: 16px;
        }

        .demo-kpi-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--dim);
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        .demo-kpi-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
        }

        .demo-kpi-delta {
            font-size: 12px;
            font-weight: 600;
            color: var(--success);
            margin-top: 4px;
        }

        /* Spacing grid */
        .space-grid {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .space-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .space-box {
            background: rgba(91, 140, 255, 0.25);
            border: 1px solid rgba(91, 140, 255, 0.4);
            border-radius: 4px;
            width: 40px;
        }

        .space-val {
            font-size: 10px;
            font-family: monospace;
            color: var(--accent);
        }

        /* Back button */
        .ds-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            border: 1px solid var(--border);
            background: transparent;
            font-family: var(--font);
            transition: all 0.15s;
            text-decoration: none;
            margin: 24px 40px 0;
        }

        .ds-back:hover {
            color: var(--text);
            border-color: var(--accent);
        }
    </style>
</head>

<body style="background: var(--bg); min-height: 100vh; overflow-y: auto;">

    <!-- Back button -->
    <a class="ds-back" href="javascript:history.back()">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>

    <!-- Hero -->
    <div class="ds-hero">
        <div class="ds-hero-eyebrow"><i class="bi bi-palette2"></i> &nbsp;NEURALORBIT</div>
        <h1 class="ds-hero-title">Design System</h1>
        <p class="ds-hero-sub">Color palette, typography, spacing, and reusable component styles.</p>
    </div>

    <div class="ds-body" id="ds-body">
        <!-- Populated by design-system.js -->
        <div style="display:flex; align-items:center; justify-content:center; height:200px;">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <script>
        // Inline color/typography/component data to render without auth dependency
        const colors = [
            { name: 'Primary BG', value: '#0A0F1F', label: 'Deep AI Navy', usage: 'Page background, primary surfaces' },
            { name: 'Card Surface', value: '#0E1628', label: 'Card Night', usage: 'Cards, modals, elevated surfaces' },
            { name: 'Accent', value: '#5B8CFF', label: 'Intelligence Blue', usage: 'Interactive elements, active tabs' },
            { name: 'Success', value: '#22C55E', label: 'Success Green', usage: 'Positive actions, confirmations' },
            { name: 'Warning', value: '#F59E0B', label: 'Warning Amber', usage: 'Alerts, caution states, admin badge' },
            { name: 'Danger', value: '#EF4444', label: 'Danger Red', usage: 'Errors, destructive actions' },
            { name: 'Purple', value: '#8B5CF6', label: 'AI Purple', usage: 'Marketing module, gradient accents' },
            { name: 'Border', value: 'rgba(255,255,255,0.06)', label: 'Subtle Border', usage: 'Card edges, dividers' },
        ];

        const typography = [
            { label: 'Heading 1', size: '24px', weight: '700', sample: 'Neural Core Dashboard' },
            { label: 'Heading 2', size: '20px', weight: '700', sample: 'Executive Overview' },
            { label: 'Heading 3', size: '16px', weight: '600', sample: 'Business Intelligence Score' },
            { label: 'Body Regular', size: '14px', weight: '400', sample: 'Real-time business intelligence powered by AI systems.' },
            { label: 'Body Medium', size: '14px', weight: '500', sample: 'Your business is 4.1% smarter this week.' },
            { label: 'Caption', size: '12px', weight: '400', sample: 'Last updated 2 minutes ago' },
            { label: 'Overline', size: '11px', weight: '700', sample: 'SYSTEM STATUS', mono: false, upper: true },
            { label: 'Mono / Code', size: '12px', weight: '500', sample: '#5B8CFF · rgba(91,140,255,0.15)', mono: true },
        ];

        const spacing = [4, 8, 12, 16, 20, 24, 32, 40, 48, 64];

        const statusBadges = [
            { label: 'Active', color: '#22C55E', bg: 'rgba(34,197,94,0.12)' },
            { label: 'Learning', color: '#5B8CFF', bg: 'rgba(91,140,255,0.12)' },
            { label: 'Warning', color: '#F59E0B', bg: 'rgba(245,158,11,0.12)' },
            { label: 'Critical', color: '#EF4444', bg: 'rgba(239,68,68,0.12)' },
            { label: 'Admin', color: '#F59E0B', bg: 'rgba(245,158,11,0.10)' },
            { label: 'User', color: '#8B5CF6', bg: 'rgba(139,92,246,0.12)' },
        ];

        document.addEventListener('DOMContentLoaded', function () {
            const body = document.getElementById('ds-body');
            body.innerHTML = `

                <!-- Colors -->
                <section>
                    <div class="ds-section-title"><i class="bi bi-droplet-half"></i> &nbsp; Color Palette</div>
                    <div class="color-grid">
                        ${colors.map(c => `
                            <div class="color-swatch">
                                <div class="color-block" style="background:${c.value};"></div>
                                <div class="color-info">
                                    <div class="color-name">${c.name}</div>
                                    <div class="color-hex">${c.label}</div>
                                    <div class="color-usage">${c.usage}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <!-- Typography -->
                <section>
                    <div class="ds-section-title"><i class="bi bi-type"></i> &nbsp; Typography — Inter</div>
                    <div class="type-list">
                        ${typography.map(t => `
                            <div class="type-row">
                                <div class="type-meta">
                                    <div class="type-label">${t.label}</div>
                                    <div class="type-spec">${t.size} · w${t.weight}</div>
                                </div>
                                <div class="type-sample" style="
                                    font-size:${t.size};
                                    font-weight:${t.weight};
                                    ${t.mono ? 'font-family:monospace; color:var(--accent);' : ''}
                                    ${t.upper ? 'letter-spacing:0.1em; text-transform:uppercase; color:var(--dim);' : ''}
                                    flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
                                ">${t.sample}</div>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <!-- Spacing -->
                <section>
                    <div class="ds-section-title"><i class="bi bi-arrows-expand"></i> &nbsp; Spacing Scale</div>
                    <div class="space-grid">
                        ${spacing.map(s => `
                            <div class="space-block">
                                <div class="space-box" style="height:${s}px;"></div>
                                <div class="space-val">${s}px</div>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <!-- Buttons -->
                <section>
                    <div class="ds-section-title"><i class="bi bi-ui-checks"></i> &nbsp; Buttons</div>
                    <div class="btn-row">
                        <button class="btn btn-primary"><i class="bi bi-lightning-fill"></i> Primary</button>
                        <button class="btn btn-secondary">Secondary</button>
                        <button class="btn btn-danger"><i class="bi bi-x-circle"></i> Danger</button>
                        <button class="btn btn-ghost">Ghost</button>
                        <button class="btn btn-primary" disabled>Disabled</button>
                        <button class="btn" style="padding:5px 12px; font-size:11px; font-weight:700; border-radius:6px;
                            color:var(--accent); background:rgba(91,140,255,0.1); border:1px solid rgba(91,140,255,0.2);">
                            <i class="bi bi-box-arrow-up-right"></i> Action Chip
                        </button>
                    </div>
                </section>

                <!-- Status Badges -->
                <section>
                    <div class="ds-section-title"><i class="bi bi-circle-fill"></i> &nbsp; Status Badges</div>
                    <div class="badge-row">
                        ${statusBadges.map(b => `
                            <span style="
                                font-size:11px; font-weight:700; padding:4px 12px; border-radius:5px;
                                letter-spacing:0.07em; color:${b.color}; background:${b.bg};
                                border:1px solid ${b.color}30;
                            ">${b.label.toUpperCase()}</span>
                        `).join('')}
                    </div>
                </section>

                <!-- Component samples -->
                <section>
                    <div class="ds-section-title"><i class="bi bi-grid-1x2"></i> &nbsp; Component Samples</div>
                    <div class="comp-grid">

                        <!-- KPI Card -->
                        <div class="comp-card">
                            <div class="comp-card-title">KPI Card</div>
                            <div class="comp-card-sub">Module metric display</div>
                            <div class="demo-kpi">
                                <div class="demo-kpi-label">INTELLIGENCE SCORE</div>
                                <div class="demo-kpi-value">87.3<span style="font-size:16px; color:var(--muted); font-weight:400;"> /100</span></div>
                                <div class="demo-kpi-delta">↑ +4.1% this week</div>
                            </div>
                        </div>

                        <!-- Alert Card -->
                        <div class="comp-card">
                            <div class="comp-card-title">Alert / Incident</div>
                            <div class="comp-card-sub">Alert Center row</div>
                            <div style="padding:12px; border-radius:8px; border-left:3px solid #EF4444; background:rgba(239,68,68,0.06);">
                                <div style="font-size:12px; font-weight:700; color:#EF4444;">CRITICAL · CRM-021</div>
                                <div style="font-size:13px; color:var(--text); margin-top:4px;">Lead assignment threshold exceeded</div>
                                <div style="font-size:11px; color:var(--dim); margin-top:3px;">2 hours ago · Auto-escalated</div>
                            </div>
                        </div>

                        <!-- Input -->
                        <div class="comp-card">
                            <div class="comp-card-title">Form Input</div>
                            <div class="comp-card-sub">Auth & settings fields</div>
                            <div style="position:relative; display:flex; align-items:center;">
                                <i class="bi bi-envelope" style="position:absolute; left:12px; color:var(--dim); font-size:13px;"></i>
                                <input type="email" placeholder="admin@neuralorbit.ai"
                                    style="width:100%; padding:10px 12px 10px 36px; border-radius:8px;
                                    border:1px solid var(--border); background:rgba(30,41,59,0.5);
                                    color:var(--text); font-family:var(--font); font-size:13px; outline:none;" />
                            </div>
                        </div>

                        <!-- Progress bar -->
                        <div class="comp-card">
                            <div class="comp-card-title">Progress / Confidence</div>
                            <div class="comp-card-sub">AI confidence indicator</div>
                            <div style="display:flex; flex-direction:column; gap:10px;">
                                ${[['AI Confidence', 94, '#5B8CFF'], ['Revenue Growth', 71, '#22C55E'], ['Risk Index', 23, '#EF4444']].map(([label, val, col]) => `
                                    <div>
                                        <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--dim); margin-bottom:4px;">
                                            <span>${label}</span><span style="color:${col}; font-weight:600;">${val}%</span>
                                        </div>
                                        <div style="height:6px; border-radius:3px; background:var(--surface); overflow:hidden;">
                                            <div style="height:100%; width:${val}%; background:${col}; border-radius:3px;"></div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- AI Insight chip -->
                        <div class="comp-card">
                            <div class="comp-card-title">AI Insight Chip</div>
                            <div class="comp-card-sub">Overview module callout</div>
                            <div style="display:flex; align-items:flex-start; gap:10px; padding:12px; border-radius:8px;
                                background:rgba(91,140,255,0.05); border:1px solid rgba(91,140,255,0.15);">
                                <i class="bi bi-cpu-fill" style="color:var(--accent); font-size:16px; flex-shrink:0; margin-top:1px;"></i>
                                <div>
                                    <div style="font-size:11px; font-weight:700; color:var(--accent); letter-spacing:0.06em; margin-bottom:4px;">AI RECOMMENDATION</div>
                                    <div style="font-size:13px; color:var(--text); line-height:1.5;">Increase CRM follow-up cadence by 20% — model predicts 12% conversion uplift.</div>
                                </div>
                            </div>
                        </div>

                        <!-- Avatar & User row -->
                        <div class="comp-card">
                            <div class="comp-card-title">User Row</div>
                            <div class="comp-card-sub">Sidebar footer component</div>
                            <div style="display:flex; align-items:center; gap:10px; padding:10px; border-radius:8px; background:rgba(30,41,59,0.4);">
                                <div style="width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#5B8CFF,#8B5CF6);
                                    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:white;">Ad</div>
                                <div style="flex:1; min-width:0;">
                                    <div style="font-size:12px; font-weight:600; color:var(--text);">Admin User</div>
                                    <div style="font-size:10px; color:var(--dim);">admin@neuralorbit.ai</div>
                                </div>
                                <i class="bi bi-box-arrow-right" style="color:var(--dim); font-size:14px;"></i>
                            </div>
                        </div>

                    </div>
                </section>

                <!-- Grid & Borders -->
                <section style="margin-bottom:40px;">
                    <div class="ds-section-title"><i class="bi bi-border-all"></i> &nbsp; Border Radius Scale</div>
                    <div style="display:flex; flex-wrap:wrap; gap:16px; align-items:center;">
                        ${[['4px', 'Chip / kbd'], ['6px', 'Button sm'], ['8px', 'Input / Tag'], ['10px', 'Card sm'], ['12px', 'Card'], ['16px', 'Modal'], ['20px', 'Auth card'], ['9999px', 'Pill']].map(([r, l]) => `
                            <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
                                <div style="width:56px; height:56px; border-radius:${r}; border:1px solid var(--accent);
                                    background:rgba(91,140,255,0.08);"></div>
                                <div style="font-size:10px; font-family:monospace; color:var(--accent);">${r}</div>
                                <div style="font-size:9px; color:var(--dim); text-align:center;">${l}</div>
                            </div>
                        `).join('')}
                    </div>
                </section>

            `;
        });
    </script>

</body>

</html>
