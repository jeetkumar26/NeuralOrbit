<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralOrbit — User Management (Admin)</title>
    <meta name="description" content="NeuralOrbit User Management" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
</head>

<body data-module="users" data-role="admin">

    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>
        <div class="main-area" id="main-area">
            <header id="topnav" class="topnav"></header>
            <main id="page-content" class="page-content">
                <div class="page-loading">
                    <div class="loading-spinner"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/guard.js"></script>
    <script src="../js/shell.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/app.js"></script>
    <script>
        /* ============================================================
           admin/users.html — User Management, Role Control & Billing
        ============================================================ */
        window.loadUsersPage = function () {
            const content = document.getElementById('page-content');
            if (!content) return;

            const users = [
                { id: 'USR-001', name: 'Sarah Johnson', email: 'sarah@techcorp.io', role: 'user', business: 'TechCorp Solutions', modules: ['CRM', 'Marketing', 'Shield'], status: 'active', lastLogin: '2 hours ago', plan: 'Growth', calls: 4820, score: 91.2 },
                { id: 'USR-002', name: 'Marcus Rivera', email: 'marcus@finedge.ai', role: 'user', business: 'FinEdge Analytics', modules: ['CRM', 'Website'], status: 'active', lastLogin: '8 hours ago', plan: 'Starter', calls: 1240, score: 83.4 },
                { id: 'USR-003', name: 'Priya Nair', email: 'priya@healthplus.in', role: 'user', business: 'HealthPlus Clinic', modules: ['CRM', 'Shield'], status: 'active', lastLogin: '1 day ago', plan: 'Growth', calls: 2980, score: 87.6 },
                { id: 'USR-004', name: 'Alex Chen', email: 'alex@storemax.com', role: 'user', business: 'StoreMax Ecommerce', modules: ['Marketing', 'Website'], status: 'suspended', lastLogin: '14 days ago', plan: 'Starter', calls: 320, score: 64.1 },
                { id: 'USR-005', name: 'Olivia Grant', email: 'olivia@buildai.net', role: 'user', business: 'BuildAI Ltd', modules: ['CRM', 'Marketing', 'Shield', 'Website'], status: 'active', lastLogin: '30 min ago', plan: 'Enterprise', calls: 9240, score: 95.8 },
            ];

            const moduleColors = { CRM: '#5B8CFF', Marketing: '#8B5CF6', Shield: '#F59E0B', Website: '#22C55E' };
            const planColors = { Starter: '#94A3B8', Growth: '#5B8CFF', Enterprise: '#22C55E' };

            content.innerHTML = `
            <div class="page-animate" style="padding: 24px; display: flex; flex-direction: column; gap: 24px;">

                <!-- Header -->
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <h1 class="page-title">User Management</h1>
                        <p class="page-subtitle">Manage accounts, roles, module access, and billing</p>
                    </div>
                    <button style="display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: var(--radius); border: none; background: linear-gradient(135deg, #5B8CFF, #3B6FE0); color: white; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); box-shadow: 0 4px 16px rgba(91,140,255,0.3);">
                        <i class="bi bi-person-plus"></i> Invite User
                    </button>
                </div>

                <!-- Summary Stats -->
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;">
                    ${[
                    { label: 'Total Users', value: '5', icon: 'bi-people-fill', color: '#5B8CFF' },
                    { label: 'Active Users', value: '4', icon: 'bi-check-circle-fill', color: '#22C55E' },
                    { label: 'Suspended', value: '1', icon: 'bi-x-circle-fill', color: '#EF4444' },
                    { label: 'Enterprise Plans', value: '1', icon: 'bi-star-fill', color: '#F59E0B' },
                ].map(s => `
                        <div class="card card-sm" style="display: flex; align-items: center; gap: 14px;">
                            <div style="width: 42px; height: 42px; border-radius: 12px; background: ${s.color}18; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                <i class="bi ${s.icon}" style="font-size: 18px; color: ${s.color};"></i>
                            </div>
                            <div>
                                <div style="font-size: 22px; font-weight: 700; color: var(--text);">${s.value}</div>
                                <div style="font-size: 11px; color: var(--dim);">${s.label}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <!-- Filter / Search -->
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="flex: 1; display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: rgba(30,41,59,0.5);">
                        <i class="bi bi-search" style="color: var(--dim); font-size: 13px;"></i>
                        <input type="text" placeholder="Search users, emails, businesses..." style="flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 13px; font-family: var(--font);" />
                    </div>
                    ${['All Roles', 'Admin', 'User'].map(f => `<button style="padding: 10px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font);">${f}</button>`).join('')}
                </div>

                <!-- Users Table -->
                <div style="border-radius: 14px; border: 1px solid var(--border-light); overflow: hidden; background: rgba(17,24,39,0.7);">
                    <div style="display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 100px 80px 80px; gap: 12px; padding: 11px 20px; border-bottom: 1px solid var(--border-light); background: rgba(17,24,39,0.9);">
                        ${['USER', 'BUSINESS', 'MODULES', 'PLAN', 'AI SCORE', 'STATUS', 'ACTIONS'].map(h =>
                    `<span style="font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em;">${h}</span>`
                ).join('')}
                    </div>
                    ${users.map(u => `
                        <div style="display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 100px 80px 80px; gap: 12px; padding: 16px 20px; border-bottom: 1px solid rgba(91,140,255,0.04); align-items: center; transition: background 0.15s;" onmouseover="this.style.background='rgba(91,140,255,0.04)'" onmouseout="this.style.background=''">
                            <div style="display: flex; align-items: center; gap: 12px; min-width: 0;">
                                <div style="width: 36px; height: 36px; border-radius: 10px; background: rgba(91,140,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0;">${u.name.substring(0, 2)}</div>
                                <div style="min-width: 0;">
                                    <div style="font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${u.name}</div>
                                    <div style="font-size: 11px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${u.email}</div>
                                </div>
                            </div>
                            <div style="font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${u.business}</div>
                            <div style="display: flex; flex-wrap: wrap; gap: 4px;">
                                ${u.modules.slice(0, 2).map(m => `<span style="font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; color: ${moduleColors[m] || '#94A3B8'}; background: ${(moduleColors[m] || '#94A3B8')}18;">${m}</span>`).join('')}
                                ${u.modules.length > 2 ? `<span style="font-size: 10px; color: var(--dim);">+${u.modules.length - 2}</span>` : ''}
                            </div>
                            <div>
                                <span style="font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 5px; color: ${planColors[u.plan] || '#94A3B8'}; background: ${(planColors[u.plan] || '#94A3B8')}18;">${u.plan}</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <div style="flex: 1; height: 5px; border-radius: 99px; background: var(--surface); overflow: hidden; max-width: 50px;">
                                    <div style="height: 100%; width: ${u.score}%; background: ${u.score >= 90 ? '#22C55E' : u.score >= 80 ? '#5B8CFF' : '#F59E0B'}; border-radius: 99px;"></div>
                                </div>
                                <span style="font-size: 12px; font-weight: 600; color: ${u.score >= 90 ? '#22C55E' : u.score >= 80 ? '#5B8CFF' : '#F59E0B'}; font-family: monospace;">${u.score}</span>
                            </div>
                            <div>
                                <span style="font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 5px; color: ${u.status === 'active' ? '#22C55E' : '#EF4444'}; background: ${u.status === 'active' ? 'rgba(34,197,94,0.12)' : 'rgba(239,68,68,0.12)'};">${u.status === 'active' ? 'Active' : 'Suspended'}</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <button title="View AI Profile" style="width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center;"><i class="bi bi-eye" style="font-size: 12px;"></i></button>
                                <button title="More Actions" style="width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center;"><i class="bi bi-three-dots-vertical" style="font-size: 12px;"></i></button>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <!-- Usage & Billing -->
                <div class="card">
                    <div class="card-title"><i class="bi bi-bar-chart-line" style="color: var(--accent);"></i> Usage & Billing Overview</div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
                        ${[
                    { label: 'Total API Calls This Month', value: '18,600', sub: '+24% vs last month', color: '#5B8CFF' },
                    { label: 'Total Decisions Made', value: '4,847', sub: 'Across all modules & users', color: '#22C55E' },
                    { label: 'Platform Revenue', value: '$2,940/mo', sub: '1 Enterprise · 2 Growth · 2 Starter', color: '#F59E0B' },
                ].map(b => `
                            <div style="padding: 18px; border-radius: 12px; border:1px solid ${b.color}20; background: ${b.color}06;">
                                <div style="font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">${b.label}</div>
                                <div style="font-size: 26px; font-weight: 700; color: ${b.color}; font-family: var(--font-mono);">${b.value}</div>
                                <div style="font-size: 11px; color: var(--muted); margin-top: 4px;">${b.sub}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>

            </div>
        `;
        };

        window.addEventListener('router-ready', () => window.loadUsersPage?.());
    </script>
</body>

</html>
