<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralOrbit — Alert Center (Admin)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
</head>

<body data-module="alerts" data-role="admin">
    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>
        <div class="main-area" id="main-area">
            <header id="topnav" class="topnav"></header>
            <main id="page-content" class="page-content">
                <div class="page-loading">
                    <div class="loading-spinner"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/guard.js"></script>
    <script src="../js/shell.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/app.js"></script>
    <script>
        window.loadAlertsPage = function () {
            const content = document.getElementById('page-content');
            if (!content) return;

            const alerts = [
                { id: 'ALT-012', severity: 'critical', module: 'Shield', user: 'Priya Nair', business: 'HealthPlus Clinic', time: '10 min ago', desc: 'Multiple failed authentication attempts detected from unusual IP range — possible brute force attack.', status: 'open' },
                { id: 'ALT-011', severity: 'high', module: 'CRM', user: 'Olivia Grant', business: 'BuildAI Ltd', time: '1 hour ago', desc: 'AI override triggered by user on 3 consecutive lead assignments — pattern suggests manual correction needed.', status: 'open' },
                { id: 'ALT-010', severity: 'medium', module: 'Marketing', user: 'Sarah Johnson', business: 'TechCorp Solutions', time: '3 hours ago', desc: 'Ad campaign budget exhausted 40% faster than predicted. AI has paused bidding pending review.', status: 'reviewed' },
                { id: 'ALT-009', severity: 'low', module: 'Website', user: 'Marcus Rivera', business: 'FinEdge Analytics', time: '6 hours ago', desc: 'A/B test variant B serving at 52% instead of configured 50% split. Rounding correction applied.', status: 'dismissed' },
                { id: 'ALT-008', severity: 'high', module: 'Shield', user: 'Alex Chen', business: 'StoreMax Ecommerce', time: '1 day ago', desc: 'Account suspension triggered. AI paused. All active workflows halted pending admin review.', status: 'escalated' },
            ];

            const overrides = [
                { user: 'Sarah Johnson', business: 'TechCorp Solutions', module: 'CRM', setting: 'Autonomy Level', from: 'Autonomous', to: 'Assist', admin: 'You', time: '2 days ago' },
                { user: 'Alex Chen', business: 'StoreMax Ecommerce', module: 'All Modules', setting: 'Account Status', from: 'Active', to: 'Suspended', admin: 'You', time: '14 days ago' },
            ];

            const sevCfg = {
                critical: { color: '#EF4444', bg: 'rgba(239,68,68,0.12)', icon: 'bi-x-octagon-fill' },
                high: { color: '#F59E0B', bg: 'rgba(245,158,11,0.12)', icon: 'bi-exclamation-triangle-fill' },
                medium: { color: '#5B8CFF', bg: 'rgba(91,140,255,0.12)', icon: 'bi-exclamation-circle-fill' },
                low: { color: '#94A3B8', bg: 'rgba(148,163,184,0.12)', icon: 'bi-info-circle-fill' },
            };
            const statCfg = {
                open: { color: '#EF4444', label: 'Open' },
                reviewed: { color: '#22C55E', label: 'Reviewed' },
                dismissed: { color: '#94A3B8', label: 'Dismissed' },
                escalated: { color: '#F59E0B', label: 'Escalated' },
            };
            const modColors = { CRM: '#5B8CFF', Marketing: '#8B5CF6', Shield: '#F59E0B', Website: '#22C55E' };

            content.innerHTML = `
            <div class="page-animate" style="padding: 24px; display: flex; flex-direction: column; gap: 24px;">
                <div style="display: flex; align-items: flex-start; justify-content: space-between;">
                    <div>
                        <h1 class="page-title">Alert Center</h1>
                        <p class="page-subtitle">Global incident feed, overrides, and admin-level controls</p>
                    </div>
                    <div style="display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius); border: 1px solid rgba(239,68,68,0.3); background: rgba(239,68,68,0.08);">
                        <div style="width: 8px; height: 8px; border-radius: 50%; background: #EF4444; animation: pulse 1.5s infinite;"></div>
                        <span style="font-size: 12px; font-weight: 700; color: #EF4444;">2 OPEN ALERTS</span>
                    </div>
                </div>

                <!-- Alert Feed -->
                <div class="card">
                    <div class="card-title"><i class="bi bi-bell-fill" style="color: var(--danger);"></i> Incident Feed <span style="margin-left: auto; font-size: 11px; font-weight: 600; color: var(--dim);">${alerts.length} total</span></div>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        ${alerts.map(a => {
                const sc = sevCfg[a.severity] || sevCfg.low;
                const st = statCfg[a.status] || statCfg.open;
                const mc = modColors[a.module] || '#94A3B8';
                return `
                                <div style="padding: 18px; border-radius: 12px; border: 1px solid ${sc.color}20; background: ${sc.color}04; display: flex; gap: 14px; align-items: flex-start; transition: background 0.15s;" onmouseover="this.style.background='${sc.color}08'" onmouseout="this.style.background='${sc.color}04'">
                                    <div style="width: 36px; height: 36px; border-radius: 10px; background: ${sc.bg}; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                        <i class="bi ${sc.icon}" style="color: ${sc.color}; font-size: 16px;"></i>
                                    </div>
                                    <div style="flex: 1; min-width: 0;">
                                        <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px;">
                                            <span style="font-size: 11px; font-weight: 700; font-family: monospace; color: var(--dim);">${a.id}</span>
                                            <span style="font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; color: ${sc.color}; background: ${sc.bg}; text-transform: uppercase;">${a.severity}</span>
                                            <span style="font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; color: ${mc}; background: ${mc}18;">${a.module}</span>
                                            <span style="font-size: 11px; color: var(--dim);">${a.user} · ${a.business}</span>
                                            <span style="font-size: 11px; color: var(--dim); margin-left: auto;">${a.time}</span>
                                        </div>
                                        <p style="font-size: 13px; color: var(--muted); margin: 0 0 12px; line-height: 1.5;">${a.desc}</p>
                                        <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                                            <span style="font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 4px; color: ${st.color}; background: ${st.color}15;">${st.label}</span>
                                            ${a.status === 'open' ? `
                                                <button onclick="this.closest('[data-alert-id]') ? '' : ''; const p = this.parentElement.parentElement; const sEl = p.querySelector('span[data-status]') || p.querySelector('span:first-child'); this.parentElement.innerHTML='<span style=\\'font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;color:#22C55E;background:rgba(34,197,94,0.15)\\'>Reviewed</span>';" style="padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border); background: transparent; font-size: 11px; font-weight: 600; color: var(--muted); cursor: pointer; font-family: var(--font);">Mark Reviewed</button>
                                                <button style="padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border); background: transparent; font-size: 11px; font-weight: 600; color: var(--muted); cursor: pointer; font-family: var(--font);">Escalate</button>
                                                <button style="padding: 3px 10px; border-radius: 4px; border: 1px solid rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); font-size: 11px; font-weight: 600; color: #EF4444; cursor: pointer; font-family: var(--font);">Emergency Response</button>
                                            ` : ''}
                                        </div>
                                    </div>
                                </div>
                            `;
            }).join('')}
                    </div>
                </div>

                <!-- Global Override Log -->
                <div class="card">
                    <div class="card-title"><i class="bi bi-sliders" style="color: var(--warning);"></i> Global Override Log</div>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        ${overrides.map(o => `
                            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 14px; padding: 14px 18px; border-radius: 10px; border: 1px solid var(--border); align-items: center;" onmouseover="this.style.background='rgba(91,140,255,0.03)'" onmouseout="this.style.background=''">
                                <div>
                                    <div style="font-size: 13px; font-weight: 600; color: var(--text);">${o.user}</div>
                                    <div style="font-size: 11px; color: var(--dim);">${o.business}</div>
                                </div>
                                <div style="font-size: 12px; color: var(--muted);">${o.module}</div>
                                <div style="font-size: 12px; color: var(--muted);">${o.setting}</div>
                                <div style="display: flex; align-items: center; gap: 6px; font-size: 12px;">
                                    <span style="color: #EF4444;">${o.from}</span>
                                    <i class="bi bi-arrow-right" style="font-size: 11px; color: var(--dim);"></i>
                                    <span style="color: #22C55E;">${o.to}</span>
                                </div>
                                <div style="font-size: 11px; color: var(--dim);">${o.admin} · ${o.time}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>

            </div>
        `;
        };
        window.addEventListener('router-ready', () => window.loadAlertsPage?.());
    </script>
</body>

</html>
