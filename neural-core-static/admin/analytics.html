<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralOrbit — System Analytics (Admin)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
</head>

<body data-module="analytics" data-role="admin">
    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>
        <div class="main-area" id="main-area">
            <header id="topnav" class="topnav"></header>
            <main id="page-content" class="page-content">
                <div class="page-loading">
                    <div class="loading-spinner"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/guard.js"></script>
    <script src="../js/shell.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/app.js"></script>
    <script>
        window.loadAnalyticsPage = function () {
            const content = document.getElementById('page-content');
            if (!content) return;

            const models = [
                { name: 'CRM Lead Scoring', module: 'CRM', accuracy: 94, prevAcc: 89, lastTrained: 'Feb 15, 2026', dataSize: '124K records', status: 'healthy', color: '#5B8CFF' },
                { name: 'Marketing Attribution', module: 'Marketing', accuracy: 91, prevAcc: 87, lastTrained: 'Feb 12, 2026', dataSize: '84K records', status: 'healthy', color: '#8B5CF6' },
                { name: 'Threat Detection v3.2', module: 'Shield', accuracy: 98, prevAcc: 96, lastTrained: 'Feb 10, 2026', dataSize: '2.1M signals', status: 'excellent', color: '#F59E0B' },
                { name: 'Website Personalization', module: 'Website', accuracy: 88, prevAcc: 80, lastTrained: 'Feb 5, 2026', dataSize: '340K sessions', status: 'retraining', color: '#22C55E' },
            ];

            const crossData = [
                { module: 'CRM', users: '4/5', avgScore: 88.4, decisions: 1060, trend: '+4.2%', color: '#5B8CFF', icon: 'bi-people' },
                { module: 'Marketing', users: '3/5', avgScore: 84.1, decisions: 720, trend: '+11.3%', color: '#8B5CF6', icon: 'bi-megaphone' },
                { module: 'Shield', users: '2/5', avgScore: 92.5, decisions: 866, trend: '+3.1%', color: '#F59E0B', icon: 'bi-shield' },
                { module: 'Website', users: '3/5', avgScore: 79.8, decisions: 1018, trend: '+19.2%', color: '#22C55E', icon: 'bi-globe' },
            ];

            const statusCfg = {
                excellent: { color: '#8B5CF6', bg: 'rgba(139,92,246,0.12)', label: 'Up-to-date' },
                healthy: { color: '#22C55E', bg: 'rgba(34,197,94,0.12)', label: 'Up-to-date' },
                retraining: { color: '#F59E0B', bg: 'rgba(245,158,11,0.12)', label: 'Needs Retraining' },
            };

            content.innerHTML = `
            <div class="page-animate" style="padding: 24px; display: flex; flex-direction: column; gap: 24px;">
                <div><h1 class="page-title">System Analytics</h1><p class="page-subtitle">Cross-user performance, system health, and AI model training control</p></div>

                <!-- System Health -->
                <div class="card">
                    <div class="card-title"><i class="bi bi-heartbeat" style="color: var(--success);"></i> System Health Monitor</div>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;">
                        ${[
                    { label: 'API Uptime', value: '99.98%', sub: 'Last 30 days', color: '#22C55E', icon: 'bi-rocket' },
                    { label: 'Avg Latency', value: '183ms', sub: '-14% from last week', color: '#5B8CFF', icon: 'bi-lightning' },
                    { label: 'Active AI Agents', value: '12', sub: '4 modules × 5 users', color: '#8B5CF6', icon: 'bi-robot' },
                    { label: 'Error Rate', value: '0.03%', sub: 'Below 0.1% threshold', color: '#F59E0B', icon: 'bi-exclamation-triangle' },
                ].map(s => `
                            <div style="padding: 18px; border-radius: 12px; border: 1px solid ${s.color}20; background: ${s.color}06;">
                                <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 10px;">
                                    <i class="bi ${s.icon}" style="color:${s.color};"></i>
                                    <span style="font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em;">${s.label}</span>
                                    <div style="width: 6px; height: 6px; border-radius: 50%; background: ${s.color}; margin-left: auto;"></div>
                                </div>
                                <div style="font-size: 26px; font-weight: 700; color: ${s.color}; font-family: monospace;">${s.value}</div>
                                <div style="font-size: 11px; color: var(--dim); margin-top: 4px;">${s.sub}</div>
                            </div>`).join('')}
                    </div>
                </div>

                <!-- Cross-User Analytics -->
                <div class="card">
                    <div class="card-title"><i class="bi bi-diagram-3" style="color: var(--accent);"></i> Cross-User AI Analytics</div>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;">
                        ${crossData.map(a => `
                            <div style="padding: 18px; border-radius: 12px; border: 1px solid ${a.color}20; background: ${a.color}06; display: flex; flex-direction: column; gap: 12px;">
                                <div style="display: flex; align-items: center; justify-content: space-between;">
                                    <div style="display: flex; align-items: center; gap: 6px;"><i class="bi ${a.icon}" style="color: ${a.color};"></i><span style="font-size: 12px; font-weight: 700; color: ${a.color};">${a.module}</span></div>
                                    <span style="font-size: 11px; font-weight: 600; color: var(--success);">${a.trend}</span>
                                </div>
                                <div><div style="font-size: 10px; color: var(--dim); margin-bottom: 4px;">Avg Score</div><div style="font-size: 22px; font-weight: 700; color: var(--text); font-family: monospace;">${a.avgScore}</div></div>
                                <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--muted);"><span>Users: ${a.users}</span><span>${a.decisions} decisions</span></div>
                            </div>`).join('')}
                    </div>
                </div>

                <!-- Model Training -->
                <div class="card">
                    <div class="card-title"><i class="bi bi-gear" style="color: var(--accent);"></i> Model Training Control Panel</div>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        ${models.map(m => {
                    const sc = statusCfg[m.status] || statusCfg.healthy;
                    return `
                                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 140px 150px; gap: 16px; padding: 16px 20px; border-radius: 12px; border: 1px solid var(--border); align-items: center;" onmouseover="this.style.background='rgba(91,140,255,0.03)'" onmouseout="this.style.background=''">
                                    <div style="display: flex; align-items: center; gap: 12px;">
                                        <div style="width: 32px; height: 32px; border-radius: 8px; background: ${m.color}18; display: flex; align-items: center; justify-content: center; flex-shrink: 0;"><i class="bi bi-cpu" style="color: ${m.color}; font-size: 14px;"></i></div>
                                        <div><div style="font-size: 13px; font-weight: 600; color: var(--text);">${m.name}</div><div style="font-size: 11px; color: var(--dim);">${m.lastTrained} · ${m.dataSize}</div></div>
                                    </div>
                                    <div><div style="font-size: 10px; color: var(--dim); margin-bottom: 3px;">Accuracy</div><div style="font-size: 18px; font-weight: 700; color: var(--text); font-family: monospace;">${m.accuracy}%</div></div>
                                    <div><div style="font-size: 10px; color: var(--dim); margin-bottom: 3px;">Training Gain</div><div style="font-size: 13px; font-weight: 700; color: var(--success);">+${m.accuracy - m.prevAcc}%</div></div>
                                    <span style="font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 5px; color: ${sc.color}; background: ${sc.bg};">${sc.label}</span>
                                    <button onclick="this.textContent='Queued ✓'; this.disabled=true; this.style.background='rgba(34,197,94,0.15)'; this.style.color='#22C55E'; this.style.borderColor='rgba(34,197,94,0.3)';" style="display: flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; font-family: var(--font);">
                                        <i class="bi bi-play-fill" style="font-size: 11px;"></i> Queue Retraining
                                    </button>
                                </div>`;
                }).join('')}
                    </div>
                </div>
            </div>
        `;
        };
        window.addEventListener('router-ready', () => window.loadAnalyticsPage?.());
    </script>
</body>

</html>
