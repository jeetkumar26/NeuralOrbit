<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralOrbit — Business Portfolio (Admin)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
</head>

<body data-module="portfolio" data-role="admin">

    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>
        <div class="main-area" id="main-area">
            <header id="topnav" class="topnav"></header>
            <main id="page-content" class="page-content">
                <div class="page-loading">
                    <div class="loading-spinner"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/guard.js"></script>
    <script src="../js/shell.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/overview.js"></script>
    <script src="../js/decision-log.js"></script>
    <script src="../js/reward-engine.js"></script>
    <script src="../js/autonomy.js"></script>
    <script src="../js/learning.js"></script>
    <script src="../js/app.js"></script>
    <script>
        /* ============================================================
           admin/portfolio.html — Business Portfolio & Per-User AI Deep Dive
        ============================================================ */
        const businesses = [
            { name: 'TechCorp Solutions', user: 'Sarah Johnson', industry: 'SaaS / B2B', score: 91.2, modules: ['CRM', 'Marketing', 'Shield'], health: 'healthy', aiInsight: 'CRM lead scoring improved 14% this week. Marketing ROAS above forecast.', decisions: 412, icon: 'bi-cpu', color: '#5B8CFF' },
            { name: 'FinEdge Analytics', user: 'Marcus Rivera', industry: 'FinTech', score: 83.4, modules: ['CRM', 'Website'], health: 'healthy', aiInsight: 'Website conversion rate growing consistently. CRM pipeline velocity above average.', decisions: 184, icon: 'bi-bank', color: '#22C55E' },
            { name: 'HealthPlus Clinic', user: 'Priya Nair', industry: 'Healthcare', score: 87.6, modules: ['CRM', 'Shield'], health: 'healthy', aiInsight: 'Shield module blocked 320 anomalies. CRM patient follow-up automation at 94% accuracy.', decisions: 298, icon: 'bi-heart-pulse', color: '#EF4444' },
            { name: 'StoreMax Ecommerce', user: 'Alex Chen', industry: 'E-commerce', score: 64.1, modules: ['Marketing', 'Website'], health: 'attention', aiInsight: 'Account suspended. AI paused during review. Last performance at 64.1 score.', decisions: 42, icon: 'bi-shop', color: '#F59E0B' },
            { name: 'BuildAI Ltd', user: 'Olivia Grant', industry: 'AI / SaaS', score: 95.8, modules: ['CRM', 'Marketing', 'Shield', 'Website'], health: 'excellent', aiInsight: 'Top performing account. All 4 modules at peak. 9,240 AI calls this month.', decisions: 840, icon: 'bi-stars', color: '#8B5CF6' },
        ];

        const healthConfig = {
            excellent: { color: '#8B5CF6', bg: 'rgba(139,92,246,0.12)', label: 'Excellent' },
            healthy: { color: '#22C55E', bg: 'rgba(34,197,94,0.12)', label: 'Healthy' },
            attention: { color: '#F59E0B', bg: 'rgba(245,158,11,0.12)', label: 'Attention' },
            critical: { color: '#EF4444', bg: 'rgba(239,68,68,0.12)', label: 'Critical' },
        };

        let deepDiveUser = null;

        window.loadPortfolioPage = function () {
            const content = document.getElementById('page-content');
            if (!content) return;

            const mColors = { CRM: '#5B8CFF', Marketing: '#8B5CF6', Shield: '#F59E0B', Website: '#22C55E' };

            content.innerHTML = `
            <div class="page-animate" style="padding: 24px; display: flex; flex-direction: column; gap: 24px;">

                <!-- Header -->
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <h1 class="page-title">Business Portfolio</h1>
                        <p class="page-subtitle">Oversight of all connected businesses and per-user AI performance</p>
                    </div>
                    <div id="deep-dive-selector" style="display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: rgba(30,41,59,0.5);">
                        <i class="bi bi-person-bounding-box" style="font-size: 14px; color: var(--accent);"></i>
                        <select id="user-select" style="background: transparent; border: none; outline: none; font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--font); cursor: pointer; padding-right: 8px;">
                            <option value="">Select user for AI Deep Dive...</option>
                            ${businesses.map((b, i) => `<option value="${i}">${b.user} — ${b.name}</option>`).join('')}
                        </select>
                    </div>
                </div>

                <!-- Business Card Grid -->
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px;" id="business-grid">
                    ${businesses.map((b, i) => {
                const hc = healthConfig[b.health] || healthConfig.healthy;
                return `
                            <div style="padding: 22px; border-radius: 16px; border: 1px solid var(--border); background: var(--card-bg); display: flex; flex-direction: column; gap: 16px; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s;" 
                                 onmouseover="this.style.borderColor='${b.color}40'; this.style.boxShadow='0 0 24px ${b.color}14';" 
                                 onmouseout="this.style.borderColor=''; this.style.boxShadow='';"
                                 onclick="document.getElementById('user-select').value='${i}'; document.getElementById('user-select').dispatchEvent(new Event('change'));">
                                <div style="display: flex; align-items: flex-start; justify-content: space-between;">
                                    <div style="display: flex; align-items: center; gap: 12px;">
                                        <div style="width: 44px; height: 44px; border-radius: 12px; background: ${b.color}18; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                                            <i class="bi ${b.icon}" style="font-size: 20px; color: ${b.color};"></i>
                                        </div>
                                        <div>
                                            <div style="font-size: 14px; font-weight: 700; color: var(--text);">${b.name}</div>
                                            <div style="font-size: 11px; color: var(--dim); margin-top: 2px;">${b.user} · ${b.industry}</div>
                                        </div>
                                    </div>
                                    <span style="font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 5px; color: ${hc.color}; background: ${hc.bg};">${hc.label}</span>
                                </div>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <div style="flex: 1; height: 6px; border-radius: 99px; background: var(--surface); overflow: hidden;">
                                        <div style="height: 100%; width: ${b.score}%; background: linear-gradient(90deg, ${b.color}, ${b.color}bb); border-radius: 99px;"></div>
                                    </div>
                                    <span style="font-size: 13px; font-weight: 700; color: ${b.color}; font-family: monospace; flex-shrink: 0;">${b.score}</span>
                                </div>
                                <div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">
                                    ${b.modules.map(m => `<span style="font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; color: ${mColors[m] || '#94A3B8'}; background: ${(mColors[m] || '#94A3B8')}18;">${m}</span>`).join('')}
                                    <span style="font-size: 11px; color: var(--dim); margin-left: auto;">${b.decisions} decisions</span>
                                </div>
                                <div style="padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border-light); background: rgba(17,24,39,0.7); font-size: 11px; color: var(--muted); line-height: 1.5;">
                                    <i class="bi bi-stars" style="color: var(--accent); margin-right: 4px;"></i>${b.aiInsight}
                                </div>
                            </div>
                        `;
            }).join('')}
                </div>

                <!-- Per-User AI Deep Dive Panel -->
                <div id="deep-dive-panel" style="display: none; flex-direction: column; gap: 0; border-radius: 16px; border: 1px solid rgba(91,140,255,0.2); background: rgba(91,140,255,0.03); overflow: hidden;">
                    <div style="padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(91,140,255,0.05);">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <i class="bi bi-person-bounding-box" style="font-size: 18px; color: var(--accent);"></i>
                            <div>
                                <div style="font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em;">AI Deep Dive</div>
                                <div id="deep-dive-title" style="font-size: 14px; font-weight: 600; color: var(--text); margin-top: 2px;">—</div>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span style="font-size: 10px; font-weight: 700; color: var(--warning); background: rgba(245,158,11,0.12); padding: 3px 10px; border-radius: 5px; letter-spacing: 0.05em;">READ-ONLY</span>
                            <button onclick="document.getElementById('deep-dive-panel').style.display='none'; document.getElementById('user-select').value='';" style="padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer;">
                                <i class="bi bi-x-lg" style="font-size: 13px;"></i>
                            </button>
                        </div>
                    </div>
                    <div style="padding: 22px;">
                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;" id="deep-dive-stats">
                        </div>
                    </div>
                </div>

            </div>
        `;

            document.getElementById('user-select')?.addEventListener('change', function () {
                const idx = this.value;
                const panel = document.getElementById('deep-dive-panel');
                const statsEl = document.getElementById('deep-dive-stats');
                const titleEl = document.getElementById('deep-dive-title');
                if (idx === '' || !panel) { if (panel) panel.style.display = 'none'; return; }
                const b = businesses[parseInt(idx)];
                if (!b) return;
                panel.style.display = 'flex';
                if (titleEl) titleEl.textContent = b.user + ' — ' + b.name;
                if (statsEl) {
                    const stat = (label, value, color) => `
                    <div style="padding: 14px 16px; border-radius: 12px; border: 1px solid ${color}18; background: ${color}06;">
                        <div style="font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;">${label}</div>
                        <div style="font-size: 22px; font-weight: 700; color: ${color}; font-family: monospace;">${value}</div>
                    </div>`;
                    statsEl.innerHTML =
                        stat('AI Score', b.score + '/100', '#5B8CFF') +
                        stat('Decisions', b.decisions, '#22C55E') +
                        stat('Modules', b.modules.length, '#8B5CF6') +
                        stat('Health', healthConfig[b.health].label, healthConfig[b.health].color);
                }
                panel.scrollIntoView({ behavior: 'smooth' });
            });
        };

        window.addEventListener('router-ready', () => window.loadPortfolioPage?.());
    </script>
</body>

</html>
