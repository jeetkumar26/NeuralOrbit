<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Core Dashboard</title>
    <meta name="description" content="Neural Core AI Operating System — Real-time business intelligence dashboard" />

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

    <!-- App CSS -->
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
</head>

<body>

    <!-- ===== APP SHELL ===== -->
    <div id="app-shell">

        <!-- ===== SIDEBAR ===== -->
        <aside id="sidebar" class="sidebar">

            <!-- Logo -->
            <div class="sidebar-logo" id="sidebar-logo">
                <div class="sidebar-logo-icon">
                    <svg class="brain-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
                        <path
                            d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" />
                        <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4" />
                        <path d="M12 18v-5" />
                        <path d="M9 9c0 .5.5 1 1 1s1-.5 1-1" />
                        <path d="M14 9c0 .5-.5 1-1 1s-1-.5-1-1" />
                    </svg>
                </div>
                <div class="sidebar-logo-text" id="sidebar-logo-text">
                    <span class="sidebar-brand">NEURAL CORE</span>
                    <span class="sidebar-tagline">AI OPERATING SYSTEM</span>
                </div>
            </div>

            <!-- Nav Items -->
            <nav class="sidebar-nav" id="sidebar-nav">
                <a href="#design-system" class="nav-item" data-route="design-system" data-label="Design System">
                    <span class="nav-prefix">00</span>
                    <i class="bi bi-palette nav-icon"></i>
                    <span class="nav-label">Design System</span>
                </a>
                <a href="#overview" class="nav-item" data-route="overview" data-label="Neural Core Dashboard">
                    <span class="nav-prefix">01</span>
                    <i class="bi bi-layout-sidebar nav-icon"></i>
                    <span class="nav-label">Neural Core Dashboard</span>
                </a>
                <a href="#crm" class="nav-item" data-route="crm" data-label="CRM Module">
                    <span class="nav-prefix">02</span>
                    <i class="bi bi-people nav-icon"></i>
                    <span class="nav-label">CRM Module</span>
                </a>
                <a href="#marketing" class="nav-item" data-route="marketing" data-label="Marketing Module">
                    <span class="nav-prefix">03</span>
                    <i class="bi bi-megaphone nav-icon"></i>
                    <span class="nav-label">Marketing Module</span>
                </a>
                <a href="#shield" class="nav-item" data-route="shield" data-label="Shield Module">
                    <span class="nav-prefix">04</span>
                    <i class="bi bi-shield nav-icon"></i>
                    <span class="nav-label">Shield Module</span>
                </a>
                <a href="#website" class="nav-item" data-route="website" data-label="Website">
                    <span class="nav-prefix">05</span>
                    <i class="bi bi-globe nav-icon"></i>
                    <span class="nav-label">Website</span>
                </a>
            </nav>

            <!-- System Status -->
            <div class="sidebar-status" id="sidebar-status">
                <div class="status-dot-wrap">
                    <span class="status-dot"></span>
                </div>
                <span class="status-label" id="status-label">All systems operational</span>
            </div>

            <!-- Collapse Toggle -->
            <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                <i class="bi bi-chevron-left" id="sidebar-toggle-icon"></i>
            </button>

        </aside>
        <!-- /SIDEBAR -->

        <!-- ===== MAIN AREA ===== -->
        <div id="main-area" class="main-area">

            <!-- ===== TOP NAV ===== -->
            <header id="topnav" class="topnav">

                <!-- Left: Breadcrumb -->
                <div class="topnav-left">
                    <svg class="topnav-brain-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
                        <path
                            d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" />
                        <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4" />
                        <path d="M12 18v-5" />
                        <path d="M9 9c0 .5.5 1 1 1s1-.5 1-1" />
                        <path d="M14 9c0 .5-.5 1-1 1s-1-.5-1-1" />
                    </svg>
                    <span class="topnav-brand">Neural Core</span>
                    <span class="topnav-sep">/</span>
                    <span id="breadcrumb" class="topnav-breadcrumb">Overview</span>
                </div>

                <!-- Center: Module Tabs -->
                <div class="topnav-tabs" id="topnav-tabs">
                    <button class="tab-btn" data-route="overview">Overview</button>
                    <button class="tab-btn" data-route="decisions">Decision Log</button>
                    <button class="tab-btn" data-route="reward">Reward Engine</button>
                    <button class="tab-btn" data-route="autonomy">Autonomy</button>
                    <button class="tab-btn" data-route="learning">Learning</button>
                </div>

                <!-- Right: Controls -->
                <div class="topnav-right">
                    <!-- Search -->
                    <button class="topnav-icon-btn" aria-label="Search">
                        <i class="bi bi-search"></i>
                    </button>

                    <!-- Bell with badge -->
                    <button class="topnav-icon-btn topnav-bell" aria-label="Notifications">
                        <i class="bi bi-bell"></i>
                        <span class="bell-dot"></span>
                    </button>

                    <!-- AI Status -->
                    <div class="ai-status" id="ai-status">
                        <i class="bi bi-lightning-fill ai-status-icon"></i>
                        <span class="ai-status-dot" id="ai-status-dot"></span>
                        <span class="ai-status-text" id="ai-status-text">AI ACTIVE</span>
                    </div>

                    <!-- Avatar -->
                    <div class="topnav-avatar" aria-label="User profile">NC</div>
                </div>

            </header>
            <!-- /TOP NAV -->

            <!-- ===== PAGE CONTENT ===== -->
            <main id="page-content" class="page-content">
                <!-- JS injects page HTML here -->
                <div class="page-loading">
                    <div class="loading-spinner"></div>
                </div>
            </main>
            <!-- /PAGE CONTENT -->

        </div>
        <!-- /MAIN AREA -->

    </div>
    <!-- /APP SHELL -->

    <!-- ===== SCRIPTS ===== -->
    <script src="js/router.js"></script>
    <script src="js/overview.js"></script>
    <script src="js/decision-log.js"></script>
    <script src="js/reward-engine.js"></script>
    <script src="js/autonomy.js"></script>
    <script src="js/learning.js"></script>
    <script src="js/design-system.js"></script>
    <script src="js/modules.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
