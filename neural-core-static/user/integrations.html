<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralOrbit — Integration Hub</title>
    <meta name="description" content="Connect your business tools to the NeuralOrbit AI platform" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
</head>

<!--
    data-role="user" → accessible by all users.
    Guard.js will redirect admins to admin/neural-orbit if role mismatch,
    so we set a role that works for both by accepting whichever the session holds.
    We override this below in the inline script once session is known.
-->

<body data-module="integrations" data-role="user">

    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>
        <div class="main-area" id="main-area">
            <header id="topnav" class="topnav"></header>
            <main id="page-content" class="page-content">
                <div class="page-loading">
                    <div class="loading-spinner"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal overlay for Integration Hub -->
    <div id="integration-modal-overlay" style="display:none;"></div>

    <!-- ① Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ② Auth helpers -->
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>

    <!-- ③ Patch body role BEFORE guard runs so role-check passes for both admin & user -->
    <script>
        (function () {
            try {
                var s = window.NOAuth && window.NOAuth.getSession && window.NOAuth.getSession();
                if (s && s.role) {
                    document.body.dataset.role = s.role;
                }
            } catch (e) { /* silent */ }
        })();
    </script>

    <!-- ④ Guard — validates auth, sets CURRENT_MODULE/ROLE, calls initShell on DOMContentLoaded -->
    <script src="../js/guard.js"></script>

    <!-- ⑤ Shell — initShell is defined here, called by guard -->
    <script src="../js/shell.js"></script>

    <!-- ⑥ Integration Hub page logic — runs after DOMContentLoaded -->
    <script src="../js/integrations.js"></script>

    <!-- ⑦ App bootstrap -->
    <script src="../js/app.js"></script>

</body>

</html>
