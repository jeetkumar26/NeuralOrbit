version: "3.9"

services:
  # ── FastAPI Backend ────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app              # Live reload in dev — remove this in production
    depends_on:
      - redis
    restart: unless-stopped

  # ── Redis (ready for Phase 2 Celery tasks) ─────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
